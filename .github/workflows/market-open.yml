name: Market-Open Execution

on:
  schedule:
    - cron: '30 13 * * 1-5'  # 9:30 AM ET (EDT = UTC-4) Mon-Fri
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Configure git
        run: |
          git config user.name "TradingBot [GHA]"
          git config user.email "bot@tradinghub.local"

      - name: Run market-open workflow
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ALPACA_ENDPOINT: https://paper-api.alpaca.markets/v2
          ALPACA_DATA_ENDPOINT: https://data.alpaca.markets/v2
        run: python scripts/run_workflow.py market-open
      - name: Fallback - commit and push memory updates
        if: always()
        run: |
          git add memory/ DAILY-SUMMARY.md 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No memory changes to commit."
          else
            git commit -m "chore: market-open fallback commit" || true
            git push || true
          fi
