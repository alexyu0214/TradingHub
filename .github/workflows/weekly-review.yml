name: Weekly Review

on:
  schedule:
    - cron: '15 20 * * 5'    # 4:15 PM ET (EDT = UTC-4) Friday only
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies for PDF rendering
        run: sudo apt-get update && sudo apt-get install -y libpango-1.0-0 libpangoft2-1.0-0

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Configure git
        run: |
          git config user.name "TradingBot [GHA]"
          git config user.email "bot@tradinghub.local"

      - name: Run weekly-review workflow
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ALPACA_ENDPOINT: https://paper-api.alpaca.markets/v2
          ALPACA_DATA_ENDPOINT: https://data.alpaca.markets/v2
        run: python scripts/run_workflow.py weekly-review
      - name: Fallback - commit and push memory + report PDF
        if: always()
        run: |
          git add memory/ DAILY-SUMMARY.md "Weekly Review/" 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No memory or report changes to commit."
          else
            git commit -m "chore: weekly-review + PDF report" || true
            git push || true
          fi

      - name: Send PDF report to Telegram
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/send_report.py weekly
